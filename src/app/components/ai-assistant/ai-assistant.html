<div class="ai-overlay" *ngIf="isOpen()" (click)="toggleChat()"></div>
<div class="ai-widget">
  <button class="ai-toggle" (click)="toggleChat()" [class.open]="isOpen()">
    <i class="fas" [class.fa-bolt]="!isOpen()" [class.fa-times]="isOpen()"></i>
    <span class="ai-toggle-label" *ngIf="!isOpen()">Ask about me</span>
  </button>

  <div class="ai-chat" *ngIf="isOpen()">
    <div class="ai-header">
      <div class="ai-header-info">
        <i class="fas fa-bolt ai-avatar"></i>
        <div>
          <p class="ai-name">Brandon's AI Assistant</p>
          <p class="ai-status">Ask me anything!</p>
        </div>
      </div>
    </div>

    <div class="ai-messages">
      <div 
        class="ai-message" 
        *ngFor="let message of messages()"
        [class.user]="message.role === 'user'"
        [class.assistant]="message.role === 'assistant'">
          <i class="fas fa-bolt message-avatar" *ngIf="message.role === 'assistant'"></i>
          <div class="message-bubble"><markdown [data]="message.content"></markdown></div>
          <i class="fas fa-user message-avatar user-avatar" *ngIf="message.role === 'user'"></i>
      </div>

      <div class="ai-message assistant" *ngIf="isLoading()">
        <span class="message-avatar">🤖</span>
        <div class="message-bubble typing">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div class="ai-input-area">
      <input 
        type="text"
        class="ai-input"
        placeholder="Ask about Brandon..."
        [(ngModel)]="userInput"
        (keydown)="onKeyDown($event)"
        [disabled]="isLoading()">
      <button 
        class="ai-send" 
        (click)="sendMessage()"
        [disabled]="isLoading() || !userInput.trim()">
        ➤
      </button>
    </div>
  </div>
</div>
